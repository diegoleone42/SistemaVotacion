server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://${HOST_USERS}:${PORT_USERS}
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=1

            - id: votes-service
              uri: http://${HOST_VOTACIONES}:${PORT_VOTACIONES}
              predicates:
                - Path=/api/votacion/**
              filters:
                - JwtAuthFilter
                - StripPrefix=1

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.client: DEBUG